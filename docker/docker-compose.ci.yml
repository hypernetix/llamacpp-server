# Docker Compose for CI integration tests
# Downloads the test model automatically, then tests gRPC, HTTP, and parallel inference
#
# Usage:
#   docker compose -f docker/docker-compose.ci.yml up --build --abort-on-container-exit
#
# This compose file:
# 1. Downloads the test model (SmolLM2-135M) in an init container
# 2. Runs gRPC and HTTP tests against a single-slot server
# 3. Runs parallel inference test against a 4-slot server
# 4. Exits with the client's exit code

services:
  # Init container: Download test model
  # Uses alpine with curl (runs as root) to avoid volume permission issues
  model-downloader:
    image: alpine:latest
    container_name: model-downloader
    volumes:
      - model-data:/models
    environment:
      # Using bartowski's SmolLM2 model (small, fast for testing)
      - MODEL_URL=${MODEL_URL:-https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-Q4_K_M.gguf}
      - MODEL_NAME=${MODEL_NAME:-SmolLM2-135M-Instruct-Q4_K_M.gguf}
    command: >
      sh -c '
        apk add --no-cache curl > /dev/null 2>&1 &&
        if [ -f "/models/$${MODEL_NAME}" ]; then
          echo "Model already exists: /models/$${MODEL_NAME}"
          ls -la /models/
        else
          echo "Downloading model: $${MODEL_NAME}..."
          curl -L --retry 3 --retry-delay 5 -o "/models/$${MODEL_NAME}" "$${MODEL_URL}"
          echo "Download complete:"
          ls -la /models/
        fi
      '
    restart: "no"

  # Server (gRPC + HTTP)
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        LLAMA_VERSION: ${LLAMA_VERSION:?LLAMA_VERSION is required — set via env or use make}
        GPU_VARIANT: ${GPU_VARIANT:-cpu}
    image: llamacpp-server:${IMAGE_TAG:-ci}-${GPU_VARIANT:-cpu}
    container_name: llamacpp-server-ci
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    volumes:
      - model-data:/models:ro
    environment:
      - LD_LIBRARY_PATH=/app
      - MODEL_NAME=${MODEL_NAME:-SmolLM2-135M-Instruct-Q4_K_M.gguf}
    command: ["--grpc-port", "50051", "--http-port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: "no"

  # gRPC Client Test
  client-grpc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    image: llamacpp-client:${IMAGE_TAG:-ci}
    container_name: llamacpp-client-grpc-ci
    depends_on:
      server:
        condition: service_healthy
    command: >
      --host server
      --port 50051
      --transport grpc
      --model /models/${MODEL_NAME:-SmolLM2-135M-Instruct-Q4_K_M.gguf}
      --test-mode greedy
      --temperature 0
      --max-tokens 50
    restart: "no"

  # HTTP Client Test
  client-http:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    image: llamacpp-client:${IMAGE_TAG:-ci}
    container_name: llamacpp-client-http-ci
    depends_on:
      server:
        condition: service_healthy
    command: >
      --host server
      --port 8080
      --transport http
      --model /models/${MODEL_NAME:-SmolLM2-135M-Instruct-Q4_K_M.gguf}
      --test-mode greedy
      --temperature 0
      --max-tokens 50
    restart: "no"

  # Multi-slot server (4 parallel inference slots)
  server-cb:
    image: llamacpp-server:${IMAGE_TAG:-ci}-${GPU_VARIANT:-cpu}
    container_name: llamacpp-server-cb-ci
    depends_on:
      model-downloader:
        condition: service_completed_successfully
    volumes:
      - model-data:/models:ro
    environment:
      - LD_LIBRARY_PATH=/app
      - MODEL_NAME=${MODEL_NAME:-SmolLM2-135M-Instruct-Q4_K_M.gguf}
    command: ["--grpc-port", "50051", "--n-parallel", "4"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: "no"

  # Parallel inference client test (against multi-slot server)
  client-grpc-cb:
    image: llamacpp-client:${IMAGE_TAG:-ci}
    container_name: llamacpp-client-grpc-cb-ci
    depends_on:
      server-cb:
        condition: service_healthy
    command: >
      --host server-cb
      --port 50051
      --transport grpc
      --model /models/${MODEL_NAME:-SmolLM2-135M-Instruct-Q4_K_M.gguf}
      --test-mode parallel
      --parallel-n 4
      --temperature 0
      --max-tokens 50
    restart: "no"

volumes:
  model-data:
    driver: local
